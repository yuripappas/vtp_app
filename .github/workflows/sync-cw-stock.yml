name: Sync Estoque CW → VTP

on:
  schedule:
    # Roda às 03:00 UTC = meia-noite horário de Brasília (BRT = UTC-3)
    - cron: '0 3 * * *'
  # Permite rodar manualmente pelo GitHub (útil para testes)
  workflow_dispatch:

jobs:
  sync:
    name: Sincronizar estoque do CardápioWeb
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Instalar dependências
        working-directory: scripts
        run: npm install

      - name: Instalar Playwright (Chromium)
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Executar sincronização
        working-directory: scripts
        env:
          CW_EMAIL:         ${{ secrets.CW_EMAIL }}
          CW_PASSWORD:      ${{ secrets.CW_PASSWORD }}
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node sync-cw-stock.js
